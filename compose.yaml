services:
  fl-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: yolo-fl-server:local
    container_name: yolo-fl-server
    restart: unless-stopped
    init: true
    environment:
      FL_SERVER_ADDRESS: 0.0.0.0:8080
      FL_CONFIG_PATH: /app/server/config_server.json
      FL_RUNS_DIR: /app/server/runs
      FL_UI_ADDRESS: 0.0.0.0:5000
      FL_ADMIN_USER: ${FL_ADMIN_USER:-admin}
      FL_ADMIN_PASSWORD: ${FL_ADMIN_PASSWORD:-change-me}
      FL_AUTOSTART: ${FL_AUTOSTART:-true}
    ports:
      - "${FL_PORT:-8080}:8080"
      - "${FL_UI_PORT:-5000}:5000"
    volumes:
      - ./server/config_server.json:/app/server/config_server.json:ro
      - fl-output:/app/server/runs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',5000),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

volumes:
  fl-output:
